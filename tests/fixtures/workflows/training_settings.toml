# Training workflow settings fixture
[execution]
mode = "training"
seed = 42

[model]
name = "ConstantWidthSimpleFFNN"
module_path = "dlkit.domain.nn"
hidden_size = 3
num_layers = 0

[trainer]
max_epochs = 1
fast_dev_run = true
accelerator = "cpu"
enable_checkpointing = false

[datamodule]
name = "ArrayDataModule"

[datamodule.dataset]
x = "data/features.npy"
root = "data"

[datamodule.dataloader]
batch_size = 2
num_workers = 0

[paths]
root = "../"
output_dir = "data/output"

[mlflow]
enable = false
