# TOML config for mixed resolution types test
[model]
name = "cae.skip1d:SkipCAE1d"
latent_size = 32

[lightning]
loss_function = {name = "MixedCustomLoss"}
optimizer = {name = "Adam", lr = 0.001, weight_decay = 1e-4}

[trainer]
max_epochs = 1
enable_progress_bar = false
enable_model_summary = false
enable_checkpointing = false

[datamodule]
name = "InMemoryModule"

[datamodule.dataset]
features = "dummy/features.npy"

[datamodule.dataloader]
batch_size = 2
num_workers = 0

[paths]
root = "dummy"
output_dir = "dummy"