# TOML config for registered components test
[model]
name = "CustomTestModel"
hidden_size = 256

[lightning]
loss_function = {name = "CustomTestLoss"}
optimizer = {name = "Adam", lr = 0.001}

[trainer]
max_epochs = 5
enable_progress_bar = false
enable_model_summary = false
enable_checkpointing = false

[datamodule]
name = "InMemoryModule"

[datamodule.dataset]
features = "dummy/features.npy"

[datamodule.dataloader]
batch_size = 2
num_workers = 0

[paths]
root = "dummy"
output_dir = "dummy"