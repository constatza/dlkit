# TOML config for Optuna hyperparameters test
[model]
name = "cae.linear:LinearCAE1d"

[model.latent_size]
low = 32
high = 128

[model.num_layers]
choices = [1, 2, 3]

[lightning]
loss_function = {name = "MSELoss"}
optimizer = {name = "Adam", lr = 0.001}

[optuna]
n_trials = 10
direction = "minimize"

[trainer]
max_epochs = 1
enable_progress_bar = false
enable_model_summary = false
enable_checkpointing = false

[datamodule]
name = "InMemoryModule"

[datamodule.dataset]
features = "dummy/features.npy"

[datamodule.dataloader]
batch_size = 2
num_workers = 0

[paths]
root = "dummy"
output_dir = "dummy"