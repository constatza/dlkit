[run]
type = "search"
seed = 42
model = "./profiles/model.toml"
data = "./profiles/data.toml"
training = "./profiles/training.toml"

[experiment]
name = "test-search"

[search]
n_trials = 2
direction = "minimize"
objective = "val/loss"

[search.space]
"training.optimizer.lr" = { type = "log_float", low = 1e-4, high = 1e-2 }
"model.hidden_size" = { type = "categorical", choices = [32, 64, 128] }
