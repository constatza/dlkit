repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.7.3
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: act-linux
        name: "act: test-linux (py3.13)"
        entry: python scripts/run_act.py --job test-linux --matrix python-version:3.13
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: act-windows
        name: "act: test-windows"
        entry: python scripts/run_act.py --job test-windows
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

