repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.7.3
    hooks:
      - id: uv-lock
        stages: [pre-commit]
        files: ^(pyproject\.toml|uv\.lock)$

  - repo: local
    hooks:
      - id: ruff
        name: "ruff: lint"
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        stages: [pre-commit]
        types_or: [python, pyi]
        files: ^(src/|tests/)
      - id: ruff-format
        name: "ruff: format"
        entry: uv run ruff format
        language: system
        stages: [pre-commit]
        types_or: [python, pyi]
        files: ^(src/|tests/)
      - id: ty
        name: "ty: src"
        entry: uv run ty check src/dlkit --output-format concise --no-progress
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^(src/|tests/|pyproject\.toml|uv\.lock|\.pre-commit-config\.yaml|\.github/workflows/|README\.md)
      - id: pytest-fast
        name: "pytest: fast smoke"
        entry: uv run pytest tests -m "not slow" --maxfail=1 --disable-warnings -q
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^(src/|tests/|pyproject\.toml|uv\.lock|\.pre-commit-config\.yaml|\.github/workflows/|README\.md)
