name: Test

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: latest
          save-cache: ${{ github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/develop') }}

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Synchronize dependencies
        run: uv sync --dev --extra cpu

      - name: Run Ruff lint
        run: uv run ruff check . --output-format github

      - name: Run Ruff format
        run: uv run ruff format --check .

      - name: Run ty
        run: uv run ty check src/dlkit --output-format github --no-progress

      - name: Run pytest fast smoke
        run: uv run pytest tests -m "not slow" --maxfail=1 --disable-warnings -q

      - name: Run pytest
        run: uv run pytest tests --maxfail=1 --disable-warnings -vv

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: latest
          save-cache: ${{ github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/develop') }}

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Synchronize dependencies
        run: uv sync --dev --extra cpu

      - name: Run pytest
        run: uv run pytest tests --maxfail=1 --disable-warnings -vv
