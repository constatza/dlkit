name: Test

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: latest
          save-cache: ${{ github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/develop') }}

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Synchronize dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest tests --maxfail=1 --disable-warnings -vv

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: latest
          save-cache: ${{ github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/develop') }}

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Synchronize dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest tests --maxfail=1 --disable-warnings -vv
