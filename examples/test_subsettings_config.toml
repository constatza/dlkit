# Test config with multiple sections for subsettings loading
[SESSION]
name = "subsettings_test"
# inference = false  # default is training
seed = 42
precision = "medium"

[SESSION.model]
name = "TestModel"
module_path = "dlkit.core.models.nn"
latent_size = 128
num_layers = 3

[MLFLOW]
enabled = true
experiment_name = "test_experiment"
run_name = "test_run"
tracking_uri = "http://localhost:5000"

[OPTUNA]
enabled = true
n_trials = 100
study_name = "test_study"

[DATAMODULE]
name = "TestDataModule"
batch_size = 32

[DATASET]
name = "TestDataset"

[TRAINING]
max_epochs = 10

[PATHS]
root = "/tmp/test_data"
output_dir = "/tmp/test_outputs"

[TRAINER]
max_epochs = 10
accelerator = "cpu"

[OPTIMIZER]
name = "Adam"
lr = 0.001
