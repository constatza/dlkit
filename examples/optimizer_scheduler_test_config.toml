# Example configuration file to test optimizer and scheduler settings
# 
# This file demonstrates the fix for the bug where training optimizer/scheduler 
# configurations were being ignored during training. The custom SGD optimizer
# (instead of default Adam) and StepLR scheduler (instead of default ReduceLROnPlateau)
# should be applied to the model during training.
#
# This can be used to verify that training optimizer/scheduler configurations
# are properly passed through to the model wrapper and not ignored.

[SESSION]
name = "optimizer_scheduler_test"
seed = 42

[PATHS]
output_dir = "./outputs"

[DATAMODULE]
name = "InMemoryModule"

[DATAMODULE.dataloader]
batch_size = 32
num_workers = 2

[DATASET]
name = "FlexibleDataset"

# Example with generated synthetic dataflow
[[DATASET.features]]
name = "features"
path = "./data/features.npy"

[[DATASET.targets]]
name = "targets"  
path = "./data/targets.npy"

[DATASET.split]
val = 0.2
test = 0.2

[MODEL]
name = "ConstantWidthFFNN"
module_path = "dlkit.core.models.nn.ffnn"
hidden_size = 64
num_layers = 3

[TRAINING]
epochs = 10

[TRAINING.trainer]
accelerator = "cpu"
max_epochs = 10
fast_dev_run = false

# Custom optimizer configuration - should be applied, not ignored
[TRAINING.optimizer]
name = "SGD"
lr = 0.01
momentum = 0.9
weight_decay = 1e-4

# Custom scheduler configuration - should be applied, not ignored  
[TRAINING.scheduler]
name = "StepLR"
step_size = 5
gamma = 0.5

[MLFLOW]
enabled = false